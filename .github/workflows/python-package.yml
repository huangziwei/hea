# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install SuiteSparse (CHOLMOD backend)
      # scikit-sparse builds against libsuitesparse-dev. Without it, hea
      # falls back to scipy.sparse.linalg.splu, whose different sparse
      # reduction order opens a wider FP floor on glmer fits — enough
      # to fail the FD-Hessian SE pin on poly() contrasts (~2e-2 abs)
      # and the predict tolerance (~3e-9 abs).
      run: sudo apt-get update && sudo apt-get install -y libsuitesparse-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install '.[fast]' --group dev
    - name: Test with pytest
      run: |
        pytest
